name: Daily recruitment update and Pages deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    timeout-minutes: 55
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v5
        with:
          fetch-depth: 0

      - name: Python 준비
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: 수집 도구 준비
        run: |
          pip install -r requirements.txt
          python -m playwright install --with-deps chromium

      - name: 인문학 채용정보 갱신
        env:
          MAX_EXTERNAL_SEARCHES: "25"
          DETAIL_CACHE_DAYS: "7"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python scripts/update_jobs.py

      - name: 대학 공식 공고와 외부 원문 분석
        env:
          MAX_EXTERNAL_SEARCHES: "25"
          DETAIL_CACHE_DAYS: "7"
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: |
          if ! python scripts/enrich_jobs.py; then
            echo "::warning::일부 대학 원문 분석에 실패했지만 확보한 데이터로 Pages 배포를 계속합니다."
          fi

      - name: 변경된 데이터 저장
        run: |
          if ! git diff --quiet -- data/; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/jobs.json data/enrichment-cache.json data/institution-domains.json data/collection-status.json
            git commit -m "data: daily recruitment update"

            PUSHED=false
            for ATTEMPT in 1 2 3; do
              echo "데이터 push 시도 ${ATTEMPT}/3"
              git fetch origin main

              if ! git rebase origin/main; then
                git rebase --abort || true
                echo "::warning::원격 main과 데이터 커밋이 충돌했습니다. Pages 배포는 현재 생성한 데이터로 계속합니다."
                break
              fi

              if git push origin HEAD:main; then
                PUSHED=true
                break
              fi

              sleep $((ATTEMPT * 3))
            done

            if [ "$PUSHED" != "true" ]; then
              echo "::warning::데이터 커밋을 저장소에 반영하지 못했지만 Pages 배포는 계속합니다."
            fi
          fi

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 정적 사이트 묶기
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update
    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
