name: Daily recruitment update and Pages deploy

on:
  push:
    branches: [main]
  schedule:
    # 매일 한국시간 오전 7시 (UTC 전날 22시)
    - cron: "0 22 * * *"
  workflow_dispatch:

permissions:
  contents: write
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  update:
    runs-on: ubuntu-latest
    outputs:
      artifact-id: ${{ steps.upload.outputs.artifact-id }}
    steps:
      - name: 저장소 가져오기
        uses: actions/checkout@v4

      - name: Python 준비
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: 수집 도구 준비
        run: pip install -r requirements.txt

      - name: 인문학 채용정보 갱신
        env:
          MAX_DETAIL_PAGES: "120"
        run: python scripts/update_jobs.py

      - name: 변경된 데이터 저장
        run: |
          if ! git diff --quiet -- data/jobs.json; then
            git config user.name "github-actions[bot]"
            git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
            git add data/jobs.json
            git commit -m "data: daily recruitment update"
            git push
          fi

      - name: GitHub Pages 설정
        uses: actions/configure-pages@v5

      - name: 정적 사이트 묶기
        id: upload
        uses: actions/upload-pages-artifact@v3
        with:
          path: .

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: update
    steps:
      - name: GitHub Pages 배포
        id: deployment
        uses: actions/deploy-pages@v4
